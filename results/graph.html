#sidebar-toggle.shifted { right: 0; }

#legend { position: absolute; bottom: 20px; left: 20px; background: #111122; border: 1px solid #333; border-radius: 6px; padding: 12px 16px; font-size: 12px; }
#legend div { margin: 3px 0; display: flex; align-items: center; gap: 8px; }
#legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
#stats { position: absolute; top: 20px; left: 20px; background: #111122; border: 1px solid #333; border-radius: 6px; padding: 12px 16px; font-size: 13px; }

nd evaluation for controlled sentiment generation and summarization; design iterations for GPT-4 evaluation (particularly summarization).", "new_source": "04_dpo_paper.pdf", "relation": "contradicts", "explanation": "The new claim implies that GPT-3 is involved in training and evaluation for GPT-4, while the existing claim states that GPT-4 is a fine-tuned model of GPT-3, suggesting that GPT-3 is not directly involved in GPT-4's training."}, {"existing": "Direct methods such as DPO often lack online data, causing issues due to distributional shift", "existing_source": "03_rlhf_survey.pdf", "new": "DPO is relatively straightforward to implement", "new_source": "04_dpo_paper.pdf", "relation": "refines", "explanation": "The new claim that DPO is relatively straightforward to implement adds nuance to the existing claim that direct methods like DPO often lack online data, which can complicate implementation."}, {"existing": "Pairwise comparisons are generally easier to supply than ratings, even when the feedback is given by a foundation model.", "existing_source": "03_rlhf_survey.pdf", "new": "The prompts are prefixes from the IMDB dataset of length 2-8 tokens", "new_source": "04_dpo_paper.pdf", "relation": "refines", "explanation": "The new claim about prompts being prefixes from the IMDB dataset adds specificity to the existing claim that pairwise comparisons are easier to supply than ratings, as it provides a concrete example of the type of data used."}, {"existing": "We focus on approaches that learn a reward model from human feedback and then use this model to train a policy.", "existing_source": "03_rlhf_survey.pdf", "new": "We use the pre-trained sentiment classifier siebert/sentiment-roberta-large-english as a ground-truth reward model", "new_source": "04_dpo_paper.pdf", "relation": "refines", "explanation": "The new claim specifies a particular pre-trained sentiment classifier as a ground-truth reward model, which adds nuance to the existing claim about learning const typeColors = {
  method: '#4ecdc4',
  concept: '#7eb8ff',
  person: '#ffd166',
  organization: '#ff6b6b',
  dataset: '#a78bfa',
  metric: '#f093fb',
  unknown: '#888',
};

const relationColors = {
  improves_upon: '#4ecdc4',
  is_variant_of: '#a78bfa',
  uses: '#7eb8ff',
  contradicts: '#ff6b6b',
  evaluates_on: '#ffd166',
};

// --- Sidebar toggle ---
const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('sidebar-toggle');
let sidebarOpen = true;

function updateToggle() {
  toggleBtn.textContent = sidebarOpen ? '▶' : '◀';
  sidebar.classList.toggle('collapsed', !sidebarOpen);
  toggleBtn.classList.toggle('shifted', !sidebarOpen);
  resizeSVG();
}

toggleBtn.addEventListener('click', () => {
  sidebarOpen = !sidebarOpen;
  updateToggle();
});

// Stats
const statsDiv = document.getElementById('stats');
statsDiv.innerHTML = `
  <div>Entities: <span>${data.nodes.length}</span></div>
  <div>Relationships: <span>${data.links.length}</span></div>
  <div>Contradictions: <span style="color:#ff6b6b">${data.contradictions.length}</span></div>
`;

// Legend
const legendDiv = document.getElementById('legend');
legendDiv.innerHTML = Object.entries(typeColors).map(([t, c]) =>
  `<div><span class="dot" style="background:${c}"></span>${t}</div>`
).join('');

// Sidebar content
sidebar.innerHTML = `<h2>Contradictions & Refinements (${data.contradictions.length})</h2>` +
  data.contradictions.map(c => `
    <div class="conflict">
      <div class="label">${c.relation}</div>
      <div class="claim">"${c.existing}"</div>
      <div class="source">— ${c.existing_source}</div>
      <div class="claim" style="color:#ff9;">vs "${c.new}"</div>
      <div class="source">— ${c.new_source}</div>
      <div class="explanation">${c.explanation}</div>
    </div>
  `).join('');

const sidebarWidth = 340;
let width = window.innerWidth - sidebarWidth;
let height = window.innerHeight;

const svg = d3.select('body').insert('svg', '#sidebar-toggle')
  .attr('width', width).attr('height', height);

const g = svg.append('g');

const zoom = d3.zoom()
  .scaleExtent([0.05, 5])
  .on('zoom', (e) => { g.attr('transform', e.transform); });

svg.call(zoom);

// Fit all nodes in view after initial layout settles
setTimeout(() => {
  const bounds = g.node().getBBox();
  if (bounds.width === 0) return;
  const pad = 60;
  const scale = Math.min(
    width / (bounds.width + pad * 2),
    height / (bounds.height + pad * 2),
    1
  );
  const tx = width / 2 - (bounds.x + bounds.width / 2) * scale;
  const ty = height / 2 - (bounds.y + bounds.height / 2) * scale;
  svg.transition().duration(750).call(
    zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}, 2000);

function resizeSVG() {
  width = sidebarOpen ? window.innerWidth - sidebarWidth : window.innerWidth;
  height = window.innerHeight;
  svg.attr('width', width).attr('height', height);
  simulation.force('center', d3.forceCenter(width / 2, height / 2));
  simulation.alpha(0.15).restart();
}

// --- Force simulation: never settles ---
const simulation = d3.forceSimulation(data.nodes)
  .force('link', d3.forceLink(data.links).id(d => d.id).distance(100).strength(0.3))
  .force('charge', d3.forceManyBody().strength(-200))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(25))
  .force('x', d3.forceX(width / 2).strength(0.01))
  .force('y', d3.forceY(height / 2).strength(0.01))
  .alphaDecay(0)
  .alphaTarget(0.02)
  .velocityDecay(0.4);

const link = g.append('g').selectAll('line')
  .data(data.links).join('line')
  .attr('class', 'link')
  .attr('stroke', d => relationColors[d.relation] || '#555')
  .attr('stroke-width', d => d.relation === 'contradicts' ? 2.5 : 1.5);

const node = g.append('g').selectAll('g')
  .data(data.nodes).join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (e, d) => { d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { d.fx = null; d.fy = null; })
  );

node.append('circle')
  .attr('r', d => 6 + Math.sqrt(d.claims) * 3)
  .attr('fill', d => typeColors[d.type] || typeColors.unknown)
  .attr('opacity', d => d.contradictions > 0 ? 1 : 0.7);

node.append('text')
  .attr('dx', 14).attr('dy', 4)
  .text(d => d.id.length > 25 ? d.id.slice(0, 22) + '...' : d.id);

const tooltip = document.getElementById('tooltip');

node.on('mouseover', (e, d) => {
  tooltip.style.display = 'block';
  tooltip.innerHTML = `
    <h3>${d.id}</h3>
    <div class="type">${d.type}</div>
    ${d.aliases.length ? '<div class="stat">Aliases: ' + d.aliases.join(', ') + '</div>' : ''}
    <div class="stat">Claims: ${d.claims}</div>
    ${d.contradictions > 0 ? '<div class="stat" style="color:#ff6b6b">Contradictions: ' + d.contradictions + '</div>' : ''}
  `;
}).on('mousemove', e => {
  tooltip.style.left = (e.pageX + 15) + 'px';
  tooltip.style.top = (e.pageY - 10) + 'px';
}).on('mouseout', () => { tooltip.style.display = 'none'; });

simulation.on('tick', () => {
  link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

updateToggle();
</script>
</body>
</html>
